name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Upgrade pip tooling
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install chaosops (core + dev + openenv + dashboard)
        run: |
          pip install -e ".[dev,openenv,dashboard]"

      - name: Show installed versions
        run: |
          python --version
          pip list

      - name: Run unit + integration tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONUNBUFFERED: "1"
        run: |
          pytest --maxfail=1 --durations=20 -ra

  lint:
    name: Import smoke-test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package only (no extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify core modules import without optional extras
        run: |
          python -c "import chaosops; import chaosops.env.environment; import chaosops.env.world_sim; import chaosops.agents.llm_adapter; import chaosops.rewards.reward_fn; print('ok')"

      - name: Verify console-script entry points resolve
        run: |
          python -c "from importlib.metadata import entry_points; eps = entry_points(group='console_scripts'); names = {e.name for e in eps if e.value.startswith('chaosops')}; assert {'chaosops-eval','chaosops-baseline','chaosops-dashboard','chaosops-transcript','chaosops-serve'}.issubset(names), names; print(sorted(names))"
